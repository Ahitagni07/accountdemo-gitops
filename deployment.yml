apiVersion: apps/v1
kind: Deployment

metadata:
  name: account-demo
  namespace: demo


spec:

  replicas: 2

  selector:
    matchLabels:
      app: account-demo


  template:

    metadata:
      labels:
        app: account-demo


    spec:

      containers:

        - name: app

          image:
            ghcr.io/ahitagni07/account-demo:latest

          ports:
            - containerPort: 8080